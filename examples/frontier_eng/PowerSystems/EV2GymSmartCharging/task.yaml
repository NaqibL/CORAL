task:
  name: "Frontier-Eng · PowerSystems/EV2GymSmartCharging"
  description: |
    # Task: EV2GymSmartCharging

    Design a charging policy for a fixed set of upstream-aligned `EV2Gym` workplace simulations.
    At each step, output one normalized charging/discharging action per charging port.

    ## Objective

    Maximize the upstream `EV2Gym` `total_reward` across three deterministic cases based on official `V2GProfitPlusLoads.yaml` data and logic.

    ## Inputs exposed to the policy

    The policy receives a stepwise `case` dictionary containing:

    - charging-port state
    - EV battery, power, and departure fields
    - transformer loading fields
    - current and future electricity prices
    - current power usage and power setpoint

    ## Output format

    Return either:

    ```python
    {"actions": [...]} 
    ```

    or a raw action list that can be coerced to a one-dimensional vector with one action per port.
    All actions must stay within `[-1, 1]`.

    ## Fixed evaluation cases

    - `workplace_winter_48cs_3tr`
    - `workplace_spring_64cs_4tr`
    - `workplace_autumn_96cs_5tr`

    ## Reference source

    - https://github.com/StavrosOrf/EV2Gym
  tips: |
    EV2GymSmartCharging unified constraints:
    1) Only modify optimization logic inside `scripts/init.py` between `EVOLVE-BLOCK-START` and `EVOLVE-BLOCK-END`.
    2) Keep the public function signature compatible: `solve(case, max_sim_calls=0, simulate_fn=None)`.
    3) Return one normalized EV2Gym action per charging port for the current step; every action must stay in `[-1, 1]`.
    4) The evaluator runs the real upstream EV2Gym simulator on three fixed workplace cases derived from copied upstream `V2GProfitPlusLoads.yaml` data.
    5) Score is the mean baseline-normalized upstream `total_reward`; the official `ChargeAsFastAsPossibleToDesiredCapacity` heuristic corresponds to a score of `100`.
    6) Do not modify `verification/evaluator.py` or files under `references/upstream/`.

    Workflow notes (CORAL):
    - The seed mirrors the benchmark directory from EinsiaLab/Frontier-Engineering.
    - Runtime: deps are pulled from `_runtime/requirements.txt` (env: `frontier-eval-driver`).
      Edit it if you need additional packages installed in the worktree venv.
    - The grader reads `frontier_eval/` metadata to run the benchmark's eval command.
    - Edit the candidate file referenced by `frontier_eval/candidate_destination.txt`
      (default falls back to `frontier_eval/initial_program.txt`).
    - The eval is staged in a sandbox copy of the codebase; outputs land at
      `<sandbox>/metrics.json` (combined_score + valid).
    - If the seed contains a `_parent/` directory, those are shared files copied
      from the parent benchmark domain — read-only by convention.

