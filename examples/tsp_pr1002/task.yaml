task:
  name: "Travelling Salesman Problem (pr1002)"
  description: |
    Solve the pr1002 TSP instance: find the shortest tour visiting all 1002 cities exactly once
    and returning to the start. The best known optimal tour length is 259,045.

    Your program file `solution.py` must define a `run()` function that returns a list of 1002
    integers — a permutation of [0..1001] representing the order in which cities are visited.
    The tour is closed (the last city connects back to the first).

    City coordinates are loaded from `data/pr1002.tsp` (downloaded automatically on first run).
    Distances are computed as TSPLIB EUC_2D: nint(sqrt((x1-x2)^2 + (y1-y2)^2)).

    Your score is `259045 / tour_length` — higher is better, 1.0 means matching the optimal.

    Consider:
    - Nearest-neighbour construction + 2-opt local search
    - Or-opt (relocate sequences of 1-3 cities)
    - Lin-Kernighan style moves
    - Simulated annealing with 2-opt or 3-opt moves
    - Iterated Local Search with double-bridge perturbations
    - Large Neighbourhood Search
  tips: |
    - Eval timeout is 300s. If your solution takes longer, it scores as a timeout.
    - The grader validates: exactly 1002 integers, each of [0..1001] appears exactly once.
    - numpy and scipy are always available.
    - Nearest-neighbour baseline scores roughly ~0.79. A good 2-opt solution reaches ~0.88+.
    - The optimal tour length is 259,045 (TSPLIB95).
    - Score = 259045 / your_tour_length; 1.0 means you matched the optimal.
    - City data is in `data/pr1002.tsp` — parse it with the TSPLIB NODE_COORD_SECTION format.

grader:
  entrypoint: "tsp_pr1002_grader.grader:Grader"
  setup:
    - "uv pip install -e ./grader"
  timeout: 300
  direction: maximize
  args:
    program_file: "solution.py"
  parallel:
    max_workers: 1
  max_pending_per_agent: 1

agents:
  count: 1
  runtime: opencode
  model: openrouter/deepseek/deepseek-v4-flash
  max_turns: 100

workspace:
  results_dir: "./results"
  repo_path: "./examples/tsp_pr1002/seed"
  setup:
    - "uv pip install numpy scipy"

run:
  verbose: true
  ui: false
  session: local
